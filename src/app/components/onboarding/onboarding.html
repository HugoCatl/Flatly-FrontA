<div class="bg-scene">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>

<div class="onboarding-page">

  <div class="brand">
    <h1>flatly</h1>
    <p>¿Cómo usarás la app?</p>
  </div>

  <div class="onboarding-card glass-card">

    <div class="onboarding-card__options">

      <button
        class="option"
        [class.option--selected]="selected() === 'tengo'"
        (click)="select('tengo')"
      >
        <span class="option__icon">🔑</span>
        <div class="option__text">
          <span class="option__label">Sí, tengo piso</span>
          <span class="option__desc">Ya vivo en un lugar y quiero gestionarlo</span>
        </div>
        @if (selected() === 'tengo') {
          <span class="option__check">✓</span>
        }
      </button>

      <button
        class="option"
        [class.option--selected]="selected() === 'buscando'"
        (click)="select('buscando')"
      >
        <span class="option__icon">🔍</span>
        <div class="option__text">
          <span class="option__label">Estoy buscando</span>
          <span class="option__desc">Quiero encontrar piso o compañeros</span>
        </div>
        @if (selected() === 'buscando') {
          <span class="option__check">✓</span>
        }
      </button>

      <button
        class="option"
        [class.option--selected]="selected() === 'gastos'"
        (click)="select('gastos')"
      >
        <span class="option__icon">💸</span>
        <div class="option__text">
          <span class="option__label">Solo gestionar gastos</span>
          <span class="option__desc">Quiero llevar el control de gastos compartidos</span>
        </div>
        @if (selected() === 'gastos') {
          <span class="option__check">✓</span>
        }
      </button>

      <button
        class="option"
        [class.option--selected]="selected() === 'propietario'"
        (click)="select('propietario')"
      >
        <span class="option__icon">🏢</span>
        <div class="option__text">
          <span class="option__label">Soy propietario</span>
          <span class="option__desc">Tengo propiedades para alquilar</span>
        </div>
        @if (selected() === 'propietario') {
          <span class="option__check">✓</span>
        }
      </button>

    </div>

    <button class="btn-primary" [disabled]="!selected()">
      Continuar
    </button>

  </div>

</div>
