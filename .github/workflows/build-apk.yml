name: 🤖 Build Android APK

on:
  # Lanzamiento manual desde GitHub → Actions → Run workflow
  workflow_dispatch:
  # También se lanza automáticamente al hacer push a estas ramas
  push:
    branches:
      - Saul
      - main
      - saul2

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Código fuente ──────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Entorno Node ───────────────────────────────────────────────────
      - name: ⬢ Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Entorno Java (requerido por Gradle) ────────────────────────────
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Caché de Gradle (acelera builds sucesivos) ─────────────────────
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Dependencias npm ───────────────────────────────────────────────
      - name: 📦 npm ci
        run: npm ci

      # ── 6. Build Angular (producción) ─────────────────────────────────────
      - name: 🔨 ng build
        run: npm run build

      # ── 7. Patch capacitor.config.ts ──────────────────────────────────────
      # El config local apunta a tu IP de desarrollo (192.168.1.x:4200).
      # En el APK final los assets van empaquetados: eliminamos el bloque server
      # para que Capacitor use los ficheros del webDir en vez del servidor local.
      - name: 🔧 Patch capacitor.config.ts (quitar server de desarrollo)
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.flatly',
            appName: 'Flatly',
            webDir: 'dist/mi-app-mobile/browser',
          };

          export default config;
          EOF

      # ── 8. Capacitor sync ─────────────────────────────────────────────────
      - name: 🔄 npx cap sync android
        run: npx cap sync android

      # ── 9. Apuntar al SDK de Android del runner ───────────────────────────
      - name: 🤖 Crear android/local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # ── 10. Permisos del wrapper de Gradle ───────────────────────────────
      - name: 🔐 chmod gradlew
        run: chmod +x android/gradlew

      # ── 11. Build APK debug ───────────────────────────────────────────────
      # Para un APK de release firmado necesitarías un keystore como Secret.
      # El APK debug es suficiente para pruebas e instalación manual.
      - name: 🏗️ Gradle assembleDebug
        run: cd android && ./gradlew assembleDebug --no-daemon

      # ── 12. Subir el APK como artefacto descargable ───────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flatly-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
